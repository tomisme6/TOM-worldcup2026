<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TOM 2026 FIFA 世界盃預測</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Bebas+Neue&display=swap');

  :root {
    --bg: #0a0e1a;
    --bg2: #111827;
    --bg3: #1a2235;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f2f8;
    --text2: #8b9ab5;
    --text3: #5a6a85;
    --gold: #f0b429;
    --green: #22c55e;
    --green-bg: rgba(34,197,94,0.12);
    --red: #f87171;
    --red-bg: rgba(248,113,113,0.12);
    --yellow: #fbbf24;
    --yellow-bg: rgba(251,191,36,0.12);
    --radius: 12px;
    --radius-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', -apple-system, sans-serif;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  /* ── HERO ── */
  .hero {
    position: relative;
    background: linear-gradient(160deg, #0d1526 0%, #1a2840 50%, #0f1d35 100%);
    border-bottom: 1px solid var(--border);
    padding: 36px 20px 28px;
    text-align: center;
    overflow: hidden;
  }
  .hero::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(ellipse 60% 50% at 50% 0%, rgba(240,180,41,0.12) 0%, transparent 70%);
    pointer-events: none;
  }
  .hero-eyebrow {
    font-size: 11px;
    font-weight: 600;
    letter-spacing: .14em;
    color: var(--gold);
    text-transform: uppercase;
    margin-bottom: 10px;
  }
  .hero h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(32px, 7vw, 58px);
    letter-spacing: .04em;
    line-height: 1.05;
    color: var(--text);
    margin-bottom: 8px;
  }
  .hero h1 .tom { color: var(--gold); }
  .hero h1 .wc  { color: var(--text); }
  .hero-sub { font-size: 13px; color: var(--text2); margin-bottom: 20px; }
  .hero-pills {
    display: flex; justify-content: center;
    flex-wrap: wrap; gap: 8px; margin-bottom: 14px;
  }
  .pill {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 4px 12px;
    border: 1px solid var(--border2); border-radius: 99px;
    font-size: 12px; color: var(--text2);
    background: rgba(255,255,255,0.04);
  }
  .pill b { color: var(--text); font-weight: 500; }
  .live-badge {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 5px 16px;
    background: rgba(240,180,41,0.15);
    border: 1px solid rgba(240,180,41,0.3);
    border-radius: 99px;
    font-size: 12px; font-weight: 500; color: var(--gold);
  }
  .live-dot {
    width: 7px; height: 7px; border-radius: 50%;
    background: var(--gold);
    animation: pulse 1.4s ease-in-out infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:.4;transform:scale(.8)} }

  /* ── REVEAL HINT ── */
  .reveal-hint {
    max-width: 480px; margin: 0 auto 0;
    padding: 10px 20px;
    background: rgba(96,165,250,0.08);
    border: 1px solid rgba(96,165,250,0.2);
    border-radius: var(--radius);
    font-size: 12px; color: #93c5fd; text-align: center;
    margin-top: 14px;
  }

  /* ── STICKY CONTROLS ── */
  .controls-wrap {
    position: sticky; top: 0; z-index: 50;
    background: rgba(10,14,26,0.94);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
  }
  .controls {
    max-width: 900px; margin: 0 auto;
    display: flex; gap: 8px; align-items: center; flex-wrap: wrap;
  }
  .ctrl-label {
    font-size: 11px; color: var(--text3);
    letter-spacing: .06em; text-transform: uppercase; white-space: nowrap;
  }
  .group-tabs { display: flex; gap: 4px; flex-wrap: wrap; flex: 1; }
  .gtab {
    padding: 5px 11px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: transparent; color: var(--text2);
    font-size: 12px; font-weight: 500; cursor: pointer;
    transition: all .15s; font-family: inherit;
  }
  .gtab:hover { background: var(--bg3); color: var(--text); }
  .gtab.active { background: var(--gold); color: #0a0e1a; border-color: var(--gold); font-weight: 700; }
  .search-box {
    padding: 6px 12px;
    border: 1px solid var(--border2); border-radius: var(--radius-sm);
    background: var(--bg2); color: var(--text);
    font-size: 13px; font-family: inherit; outline: none; width: 150px;
    transition: border-color .15s;
  }
  .search-box:focus { border-color: var(--gold); }
  .search-box::placeholder { color: var(--text3); }

  /* ── STATS ── */
  .stats-bar {
    max-width: 900px; margin: 0 auto;
    padding: 10px 16px 0;
    display: flex; gap: 6px; flex-wrap: wrap;
  }
  .sc {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 5px 10px;
    font-size: 12px; color: var(--text2);
  }
  .sc b { color: var(--text); font-weight: 600; }

  /* ── LEGEND ── */
  .legend {
    max-width: 900px; margin: 0 auto;
    padding: 8px 16px;
    display: flex; gap: 12px; flex-wrap: wrap;
    font-size: 11px; color: var(--text3); align-items: center;
  }
  .legend-item { display: flex; align-items: center; gap: 5px; }
  .ld { width: 10px; height: 3px; border-radius: 2px; }

  /* ── MAIN ── */
  .main { max-width: 900px; margin: 0 auto; padding: 12px 16px 48px; }

  /* ── ROUND HEADER ── */
  .round-header {
    display: flex; align-items: center; gap: 12px;
    margin: 22px 0 8px;
  }
  .round-header:first-child { margin-top: 6px; }
  .round-line { flex: 1; height: 1px; background: var(--border); }
  .round-label {
    font-size: 11px; font-weight: 600;
    letter-spacing: .1em; text-transform: uppercase;
    color: var(--text3); white-space: nowrap;
  }

  /* ── DAY ── */
  .day-label {
    font-size: 12px; color: var(--text3);
    margin: 12px 0 5px;
    display: flex; align-items: center; gap: 8px;
  }
  .day-label::after { content:''; flex:1; height:1px; background:var(--border); }

  /* ── MATCH CARD ── */
  .match-card {
    background: var(--bg2); border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 12px 14px; margin-bottom: 5px;
    display: grid;
    grid-template-columns: 52px 1fr 108px 1fr 136px;
    align-items: center; gap: 10px;
    position: relative; overflow: hidden;
    transition: border-color .15s, background .15s, transform .1s;
  }
  .match-card::before {
    content:''; position:absolute; left:0; top:0; bottom:0;
    width:3px; border-radius:3px 0 0 3px;
  }
  .match-card.played::before  { background: var(--green); }
  .match-card.upcoming::before { background: var(--border2); }
  .match-card.upcoming { cursor: default; }
  .match-card.correct { background: rgba(59,130,246,0.13); border-color: rgba(59,130,246,0.4); }
  .match-card.correct::before { background: #3b82f6; }
  .match-card.wrong   { background: rgba(248,113,113,0.10); border-color: rgba(248,113,113,0.35); }
  .match-card.wrong::before   { background: var(--red); }

  /* ── META COL ── */
  .meta-col { text-align: center; }
  .grp-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 28px; height: 28px; border-radius: 50%;
    background: rgba(240,180,41,0.15);
    border: 1px solid rgba(240,180,41,0.3);
    font-size: 12px; font-weight: 700; color: var(--gold);
    margin-bottom: 3px;
  }
  .venue-tag { font-size: 10px; color: var(--text3); line-height: 1.3; }

  /* ── TEAMS ── */
  .team-home { display: flex; align-items: center; gap: 7px; }
  .team-away { display: flex; align-items: center; gap: 7px; flex-direction: row-reverse; text-align: right; }
  .flag { font-size: 21px; line-height: 1; flex-shrink: 0; }
  .tname { font-size: 14px; font-weight: 600; color: var(--text); }
  .tname.sm { font-size: 12px; }

  /* ── SCORE COL ── */
  .score-col { text-align: center; }
  .score-final { font-size: 22px; font-weight: 700; color: var(--text); letter-spacing: .04em; }
  .score-final-label { font-size: 10px; color: var(--green); margin-top: 1px; }
  .score-dual { display: flex; flex-direction: column; align-items: center; gap: 2px; }
  .score-real { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: .04em; }
  .score-real-label { font-size: 9px; color: var(--green); letter-spacing: .04em; margin-bottom: 3px; }
  .score-divider { width: 28px; height: 1px; background: var(--border2); margin: 1px 0; }
  .score-pred-row { display: flex; flex-direction: column; align-items: center; gap: 1px; }
  .score-pred-val { font-size: 13px; font-weight: 600; color: var(--text2); letter-spacing: .04em; }
  .score-pred-label { font-size: 9px; color: var(--text3); }
  .match-card.correct .score-pred-val { color: #3b82f6; }
  .match-card.wrong   .score-pred-val { color: var(--red); }

  /* ── HIDDEN STATE ── */
  .pred-hidden {
    display: flex; flex-direction: column; align-items: center; gap: 6px;
  }
  .reveal-btn {
    display: inline-flex; align-items: center; gap: 5px;
    padding: 7px 14px;
    background: rgba(240,180,41,0.1);
    border: 1px solid rgba(240,180,41,0.35);
    border-radius: var(--radius-sm);
    font-size: 12px; font-weight: 600; color: var(--gold);
    cursor: pointer; font-family: inherit;
    transition: background .15s, transform .1s;
    white-space: nowrap;
  }
  .reveal-btn:hover { background: rgba(240,180,41,0.2); transform: scale(1.03); }
  .reveal-btn:active { transform: scale(0.97); }
  .vs-text { font-size: 14px; font-weight: 600; color: var(--text3); }

  /* ── REVEALED STATE ── */
  .pred-revealed { display: none; flex-direction: column; align-items: center; gap: 3px; }
  .pred-revealed.show { display: flex; }
  .pred-score { font-size: 20px; font-weight: 700; color: var(--text); letter-spacing: .04em; }
  .tip-badge {
    display: inline-block; padding: 2px 8px;
    border-radius: 4px; font-size: 10px; font-weight: 600;
  }
  .tip-H { background: var(--green-bg); color: var(--green); border: 1px solid rgba(34,197,94,0.25); }
  .tip-D { background: var(--yellow-bg); color: var(--yellow); border: 1px solid rgba(251,191,36,0.25); }
  .tip-A { background: var(--red-bg); color: var(--red); border: 1px solid rgba(248,113,113,0.25); }
  .conf-wrap { display: flex; align-items: center; gap: 5px; margin-top: 1px; }
  .conf-bar-bg { width: 52px; height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
  .conf-bar-fill { height: 100%; border-radius: 2px; transition: width .6s ease; }
  .conf-txt { font-size: 10px; color: var(--text3); }

  /* ── ANALYSIS COL ── */
  .analysis-col {
    font-size: 11px; color: var(--text3); line-height: 1.5;
    border-left: 1px solid var(--border); padding-left: 10px;
  }
  .analysis-col .analyst {
    font-size: 10px; color: var(--text3); margin-bottom: 2px;
    text-transform: uppercase; letter-spacing: .06em;
  }
  .analysis-col .note-hidden { color: var(--text3); font-style: italic; }
  .analysis-col .note-shown  { color: var(--text2); display: none; }
  .analysis-col.revealed .note-hidden { display: none; }
  .analysis-col.revealed .note-shown  { display: block; }

  /* ── EMPTY ── */
  .no-results { text-align: center; padding: 48px 20px; color: var(--text3); font-size: 14px; }

  /* ── FOOTER ── */
  .footer {
    text-align: center; padding: 24px 16px 32px;
    color: var(--text3); font-size: 12px;
    border-top: 1px solid var(--border); margin-top: 16px;
  }
  .footer span { color: var(--gold); }

  /* ── RESPONSIVE ── */
  @media (max-width: 640px) {
    .match-card { grid-template-columns: 38px 1fr 100px 1fr; gap: 6px; }
    .analysis-col { display: none; }
    .tname { font-size: 12px; }
    .tname.sm { font-size: 11px; }
    .flag { font-size: 17px; }
    .grp-badge { width: 24px; height: 24px; font-size: 11px; }
    .pred-score { font-size: 17px; }
    .score-final { font-size: 18px; }
    .reveal-btn { font-size: 11px; padding: 6px 10px; }
  }
  @media (max-width: 380px) {
    .venue-tag { display: none; }
    .hero h1 { font-size: 28px; }
  }
  @media (prefers-reduced-motion: reduce) {
    .live-dot { animation: none; }
    .reveal-btn, .match-card { transition: none; }
  }
</style>
</head>

const ROUND_LABELS = {1:'第一輪（首戰）',2:'第二輪',3:'第三輪（決定性）'};
const TIP_LABEL = {H:'主勝',D:'平局',A:'客勝'};
const TIP_CLS   = {H:'tip-H',D:'tip-D',A:'tip-A'};
const CONF_COLOR = c => c >= 80 ? '#22c55e' : c >= 60 ? '#fbbf24' : '#f87171';

// unique id per match
MATCHES.forEach((m,i) => m.id = i);

let currentGroup = 'all';

function matchId(m){ return 'wc_' + m.id; }

function isRevealed(m){
  return getRevealed()[matchId(m)] === true;
}

function reveal(id){
  // id = numeric match index
  const m = MATCHES[id];
  setRevealed(matchId(m));

  const card = document.querySelector(`.match-card[data-id="${id}"]`);
  if(!card) return;

  // show prediction
  const hidden = card.querySelector('.pred-hidden');
  const revealed = card.querySelector('.pred-revealed');
  const ac = card.querySelector('.analysis-col');
  if(hidden) hidden.style.display = 'none';
  if(revealed){ revealed.style.display = 'flex'; revealed.classList.add('show'); }
  if(ac) ac.classList.add('revealed');

  // animate conf bar
  const fill = card.querySelector('.conf-bar-fill');
  if(fill){ setTimeout(()=>{ fill.style.width = m.conf + '%'; }, 50); }
}

function getFiltered(){
  const sq = document.getElementById('search').value.toLowerCase().trim();
  return MATCHES.filter(m => {
    const gOk = currentGroup === 'all' || m.g === currentGroup;
    const sOk = !sq || m.hn.toLowerCase().includes(sq) || m.an.toLowerCase().includes(sq);
    return gOk && sOk;
  });
}

function updateStats(data){
  const played   = data.filter(m=>m.played).length;
  const upcoming = data.length - played;
  const rev      = data.filter(m=>!m.played && isRevealed(m)).length;
  document.getElementById('stats-bar').innerHTML = `
    <div class="sc">共 <b>${data.length}</b> 場</div>
    <div class="sc">✅ 已結束 <b>${played}</b></div>
    <div class="sc">⏳ 未開打 <b>${upcoming}</b></div>
    <div class="sc">👁 已揭曉 <b>${rev}</b> / ${upcoming}</div>
  `;
}

function isPredCorrect(m){
  return m.played && m.score && m.pred && m.score === m.pred;
}

function buildScoreCol(m){
  if(m.played){
    const correct = isPredCorrect(m);
    const predColor = correct ? '#3b82f6' : 'var(--red)';
    return `<div class="score-dual">
              <div class="score-real-label">✓ 終場</div>
              <div class="score-real">${m.score}</div>
              <div class="score-divider"></div>
              <div class="score-pred-row">
                <div class="score-pred-val">${m.pred}</div>
                <div class="score-pred-label">${correct ? '✅ 預測命中' : '❌ 預測落空'}</div>
              </div>
            </div>`;
  }
  const rev = isRevealed(m);
  const hiddenDisplay  = rev ? 'none'  : 'flex';
  const revealedDisplay= rev ? 'flex'  : 'none';
  const barW = rev ? m.conf : 0;
  return `
    <div class="pred-hidden" style="display:${hiddenDisplay}">
      <div class="vs-text">vs</div>
      <button class="reveal-btn" onclick="reveal(${m.id});event.stopPropagation()">
        🔮 揭曉預測
      </button>
    </div>
    <div class="pred-revealed${rev?' show':''}" style="display:${revealedDisplay}">
      <div class="pred-score">${m.pred}</div>
      <div class="pred-meta">
        <span class="tip-badge ${TIP_CLS[m.tip]}">${TIP_LABEL[m.tip]}</span>
        <div class="conf-wrap">
          <div class="conf-bar-bg">
            <div class="conf-bar-fill" style="width:${barW}%;background:${CONF_COLOR(m.conf)}"></div>
          </div>
          <span class="conf-txt">${m.conf}%</span>
        </div>
      </div>
    </div>`;
}

function buildAnalysisCol(m){
  if(m.played){
    return `<div class="analysis-col revealed">
              <div class="analyst">比賽結果</div>
              <div class="note-shown">${m.note}</div>
            </div>`;
  }
  const rev = isRevealed(m);
  return `<div class="analysis-col${rev?' revealed':''}">
            <div class="analyst">分析師預測</div>
            <div class="note-hidden">按「揭曉預測」查看</div>
            <div class="note-shown">${m.note}</div>
          </div>`;
}

function render(){
  const data = getFiltered();
  updateStats(data);
  const main = document.getElementById('main');

  if(data.length === 0){
    main.innerHTML = '<div class="no-results">找不到符合條件的比賽 🔍</div>';
    return;
  }

  const byRound = {};
  data.forEach(m => {
    if(!byRound[m.r]) byRound[m.r] = [];
    byRound[m.r].push(m);
  });

  let html = '';
  Object.keys(byRound).sort((a,b)=>a-b).forEach(r => {
    const ms = byRound[r];
    html += `<div class="round-header">
               <div class="round-line"></div>
               <div class="round-label">⚽ ${ROUND_LABELS[r]} · ${ms.length} 場</div>
               <div class="round-line"></div>
             </div>`;

    const byDate = {};
    ms.forEach(m => {
      const k = m.d + '|' + m.day;
      if(!byDate[k]) byDate[k] = [];
      byDate[k].push(m);
    });

    Object.entries(byDate).forEach(([dk, matches]) => {
      const [date, day] = dk.split('|');
      const grps = [...new Set(matches.map(m=>m.g))].join(' · ');
      html += `<div class="day-label">${date} &nbsp;${day} &nbsp;·&nbsp; 第 ${grps} 組</div>`;

      matches.forEach(m => {
        const hn = m.hn.length > 4 ? `<span class="tname sm">${m.hn}</span>` : `<span class="tname">${m.hn}</span>`;
        const an = m.an.length > 4 ? `<span class="tname sm">${m.an}</span>` : `<span class="tname">${m.an}</span>`;
        const resultCls = m.played ? (isPredCorrect(m) ? ' correct' : ' wrong') : '';
        html += `
          <div class="match-card ${m.played?'played':'upcoming'}${resultCls}" data-id="${m.id}">
            <div class="meta-col">
              <div class="grp-badge">${m.g}</div>
              <div class="venue-tag">${m.venue}</div>
            </div>
            <div class="team-home"><span class="flag">${m.hf}</span>${hn}</div>
            <div class="score-col">${buildScoreCol(m)}</div>
            <div class="team-away"><span class="flag">${m.af}</span>${an}</div>
            ${buildAnalysisCol(m)}
          </div>`;
      });
    });
  });

  main.innerHTML = html;

  // restore conf bar widths for already-revealed matches
  data.filter(m => !m.played && isRevealed(m)).forEach(m => {
    const fill = document.querySelector(`.match-card[data-id="${m.id}"] .conf-bar-fill`);
    if(fill) fill.style.width = m.conf + '%';
  });
}

// ── Tab ──
document.getElementById('group-tabs').addEventListener('click', e => {
  const btn = e.target.closest('.gtab');
  if(!btn) return;
  document.querySelectorAll('.gtab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  currentGroup = btn.dataset.g;
  render();
});

document.getElementById('search').addEventListener('input', render);

};

async function fetchLiveScores() {
  try {
    const res = await fetch('https://api.football-data.org/v4/competitions/WC/matches?status=FINISHED', {
      headers: { 'X-Auth-Token': API_TOKEN }
    });
    if (!res.ok) return;
    const data = await res.json();
    const apiMatches = data.matches || [];

    let updated = false;
    apiMatches.forEach(am => {
      const hName = TEAM_MAP[am.homeTeam.name] || am.homeTeam.name;
      const aName = TEAM_MAP[am.awayTeam.name] || am.awayTeam.name;
      const hGoals = am.score.fullTime.home;
      const aGoals = am.score.fullTime.away;
      if (hGoals === null || aGoals === null) return;

      const match = MATCHES.find(m => m.hn === hName && m.an === aName);
      if (match && !match.played) {
        match.played = true;
        match.score = `${hGoals}–${aGoals}`;
        updated = true;
      }
    });

    if (updated) render();
  } catch(e) {
    // 靜默失敗，不影響頁面顯示
  }
}

render();
fetchLiveScores();
// 每 5 分鐘自動刷新一次
setInterval(fetchLiveScores, 5 * 60 * 1000);
